<!DOCTYPE html>
<html>
<head>
<title>Suzhou - Venice of the East</title>
<meta charset="utf-8">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: 'Palatino Linotype', 'Book Antiqua', serif;
  min-height: 100vh;
  background: #1e3a5f;
  position: relative;
  overflow: hidden;
}
.water-pattern {
  position: absolute;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(circle at 20% 50%, rgba(100,149,237,0.1) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(70,130,180,0.1) 0%, transparent 50%);
  animation: wave 20s ease-in-out infinite;
}
@keyframes wave {
  0%, 100% { transform: translate(-5%, -5%) rotate(0deg); }
  50% { transform: translate(5%, 5%) rotate(2deg); }
}
.content {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.ink-mark {
  position: absolute;
  top: 100px;
  right: 100px;
  width: 150px;
  height: 150px;
  background: rgba(100,149,237,0.2);
  border-radius: 50%;
  filter: blur(40px);
}
.title {
  color: #e8f4f8;
  font-size: 80px;
  font-weight: normal;
  letter-spacing: 20px;
  margin-bottom: 20px;
  font-style: italic;
}
.subtitle {
  color: #87ceeb;
  font-size: 14px;
  letter-spacing: 8px;
  margin-bottom: 60px;
}
.enter-btn {
  padding: 16px 45px;
  background: transparent;
  border: 1px solid #87ceeb;
  color: #87ceeb;
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 4px;
  transition: all 0.4s;
}
.enter-btn:hover {
  background: #87ceeb;
  color: #1e3a5f;
}
</style>
</head>
<body>
  <div class="water-pattern"></div>
  <div class="ink-mark"></div>
  <div class="content">
    <h1 class="title">Suzhou</h1>
    <p class="subtitle">VENICE OF THE EAST</p>
    <a href="gardens.html" class="enter-btn">EXPLORE</a>
  </div>
</body>
</html>
